  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,0.16), transparent 28%),
        radial-gradient(circle at 82% 88%, rgba(180,185,190,0.18), transparent 30%),
        linear-gradient(135deg, #050505 0%, #151515 48%, #070707 100%);
      color: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -45%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 25% 25%, rgba(235, 239, 242, 0.18), transparent 26%),
        radial-gradient(circle at 75% 35%, rgba(150, 158, 166, 0.16), transparent 28%),
        radial-gradient(circle at 52% 78%, rgba(255, 255, 255, 0.10), transparent 30%);
      filter: blur(6px);
      opacity: 0.75;
      animation: bgGlowMove 18s ease-in-out infinite alternate;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 72px 72px;
      opacity: 0.18;
      animation: bgGridMove 28s linear infinite;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,0.9), transparent 72%);
      -webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,0.9), transparent 72%);
    }

    @keyframes bgGlowMove {
      0% {
        transform: translate3d(-3%, -2%, 0) scale(1);
      }

      50% {
        transform: translate3d(4%, 3%, 0) scale(1.05);
      }

      100% {
        transform: translate3d(2%, -4%, 0) scale(1.08);
      }
    }

    @keyframes bgGridMove {
      0% {
        background-position: 0 0, 0 0;
      }

      100% {
        background-position: 72px 72px, 72px 72px;
      }
    }

    .business-card {
      width: 100%;
      max-width: 820px;
      min-height: 390px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      border-radius: 28px;
      overflow: hidden;
      position: relative;
      z-index: 1;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.015)),
        linear-gradient(145deg, #1a1a1a 0%, #090909 100%);
      border: 1px solid rgba(210, 215, 220, 0.28);
      box-shadow:
        0 38px 120px rgba(0, 0, 0, 0.66),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .business-card::before {
      content: "";
      position: absolute;
      inset: 12px;
      border: 1px solid rgba(230, 234, 238, 0.12);
      border-radius: 20px;
      pointer-events: none;
      z-index: 3;
    }

    .business-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.06) 42%, transparent 70%);
      pointer-events: none;
      opacity: 0.7;
    }

    .left {
      padding: 62px 64px 58px 68px;
      display: flex;
      align-items: center;
      position: relative;
      background:
        linear-gradient(120deg, rgba(255,255,255,0.06), transparent 48%),
        linear-gradient(180deg, rgba(255,255,255,0.035), transparent);
    }

    .left-inner {
      width: 100%;
      position: relative;
      z-index: 4;
    }

    h1 {
      font-size: 44px;
      font-weight: 500;
      letter-spacing: 8px;
      color: #ffffff;
      margin-bottom: 24px;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.55);
    }

    .company {
      margin-bottom: 32px;
      padding-bottom: 28px;
      border-bottom: 1px solid rgba(230, 234, 238, 0.16);
    }

    .company p {
      font-size: 16px;
      line-height: 1.9;
      letter-spacing: 0.4px;
    }

    .company p + p {
      margin-top: 7px;
    }

    .company a {
      color: #d8dce0;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .company a:hover {
      color: #ffffff;
      letter-spacing: 0.8px;
    }

    .contact {
      display: grid;
      gap: 14px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      font-size: 15px;
      line-height: 1.7;
    }

    .contact-item span {
      width: 54px;
      color: #9da3a8;
      flex-shrink: 0;
      letter-spacing: 1px;
    }

    .contact-item a {
      color: #f0f1f2;
      text-decoration: none;
      word-break: break-all;
      transition: all 0.25s ease;
    }

    .contact-item a:hover {
      color: #ffffff;
      text-decoration: underline;
    }

    .right {
      padding: 52px 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      background:
        radial-gradient(circle at top right, rgba(230,234,238,0.16), transparent 36%),

      border-left: 1px solid rgba(230, 234, 238, 0.14);
    }

    .right::before {
      content: "";
      position: absolute;
      width: 210px;
      height: 210px;
      border: 1px solid rgba(230, 234, 238, 0.12);
      border-radius: 50%;
      top: -80px;
      right: -80px;
    }

    .right::after {
      content: "";
      position: absolute;
      width: 130px;
      height: 130px;
      border: 1px solid rgba(230, 234, 238, 0.1);
      border-radius: 50%;
      bottom: -46px;
      left: -46px;
    }

    .qr-wrap {
      position: relative;
      z-index: 4;
    }

    .qr {
      width: 162px;
      height: 162px;
      padding: 9px;
      border-radius: 22px;
      background: linear-gradient(145deg, #ffffff, #d7dce0);
      box-shadow:
        0 22px 55px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(230, 234, 238, 0.28);
    }

    .qr img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 14px;
      display: block;
    }

    .qr-text {
      margin-top: 18px;
      font-size: 14px;
      color: #d8dce0;
      letter-spacing: 1.5px;
    }

    @media (prefers-reduced-motion: reduce) {
      body::before,
      body::after {
        animation: none;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 18px;
      }

      .business-card {
        grid-template-columns: 1fr;
        max-width: 430px;
        min-height: auto;
      }

      .business-card::before {
        inset: 10px;
      }

      .left {
        padding: 46px 34px 40px 38px;
      }

      h1 {
        font-size: 34px;
        letter-spacing: 6px;
        margin-bottom: 20px;
        text-align: center;
      }

      .company {
        margin-bottom: 28px;
        padding-bottom: 24px;
        text-align: center;
      }

      .company p {
        font-size: 15px;
        line-height: 1.85;
      }

      .contact {
        gap: 12px;
      }

      .contact-item {
        align-items: flex-start;
      }

      .right {
        padding: 42px 30px 48px;
        border-left: none;
        border-top: 1px solid rgba(230, 234, 238, 0.14);
      }

      .qr {
        width: 150px;
        height: 150px;
      }
    }
  </style>
</head>
